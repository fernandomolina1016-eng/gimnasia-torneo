class SupabaseClient {
  constructor(url, key) {
    this.url=url; this.key=key; this.token=null; this.refreshToken=null; this.user=null; this._listeners=[];
    try { const s=localStorage.getItem("sb_session"); if(s){const p=JSON.parse(s);this.token=p.token;this.refreshToken=p.refreshToken;this.user=p.user;} } catch(e){}
  }
  _save(token,refreshToken,user) {
    this.token=token; this.refreshToken=refreshToken; this.user=user;
    if(token) localStorage.setItem("sb_session",JSON.stringify({token,refreshToken,user}));
    else localStorage.removeItem("sb_session");
    this._listeners.forEach(fn=>fn(user));
  }
  onAuthStateChange(fn){ this._listeners.push(fn); return {unsubscribe:()=>{this._listeners=this._listeners.filter(f=>f!==fn);}}; }
  async _fetch(path,options){
    const opts=options||{};
    const headers=Object.assign({"Content-Type":"application/json",apikey:this.key},this.token?{Authorization:"Bearer "+this.token}:{},opts.headers||{});
    const res=await fetch(this.url+path,Object.assign({},opts,{headers}));
    const text=await res.text();
    let data; try{data=JSON.parse(text);}catch(e){data=text;}
    if(!res.ok) throw new Error((data&&data.message)||(data&&data.error_description)||JSON.stringify(data));
    return data;
  }
  from(table){return new QB(this,table);}
}

function makeAuth(c){
  return {
    signUp: cr=>c._fetch("/auth/v1/signup",{method:"POST",body:JSON.stringify({email:cr.email,password:cr.password})}),
    signInWithPassword: async cr=>{
      const data=await c._fetch("/auth/v1/token?grant_type=password",{method:"POST",body:JSON.stringify({email:cr.email,password:cr.password})});
      c._save(data.access_token,data.refresh_token,data.user);
      return {data,error:null};
    },
    signOut: async()=>{try{await c._fetch("/auth/v1/logout",{method:"POST"});}catch(e){}c._save(null,null,null);},
    resetPasswordForEmail: email=>c._fetch("/auth/v1/recover",{method:"POST",body:JSON.stringify({email})}),
    getUser: ()=>c.user,
  };
}

class QB {
  constructor(client,table){this.client=client;this.table=table;this._params={};this._select="*";this._order=null;this._body=null;this._method="GET";this._filters=[];this._single=false;this._limit=null;this._headers={};}
  select(c){this._select=c||"*";return this;}
  order(c,o){this._order=c+"."+(!o||o.ascending!==false?"asc":"desc");return this;}
  limit(n){this._limit=n;return this;}
  single(){this._single=true;this._headers["Accept"]="application/vnd.pgrst.object+json";return this;}
  maybeSingle(){this._single=true;return this;}
  eq(c,v){this._filters.push(c+"=eq."+encodeURIComponent(v));return this;}
  in(c,vs){this._filters.push(c+"=in.("+vs.map(v=>encodeURIComponent(v)).join(",")+")");return this;}
  insert(d){this._method="POST";this._body=d;return this;}
  update(d){this._method="PATCH";this._body=d;return this;}
  upsert(d,o){o=o||{};this._method="POST";this._body=d;this._headers["Prefer"]=o.onConflict?"resolution=merge-duplicates,return=representation":"return=representation";if(o.onConflict)this._params.on_conflict=o.onConflict;return this;}
  delete(){this._method="DELETE";return this;}
  async _build(){
    const qs=new URLSearchParams();
    if(this._method==="GET"||this._method==="DELETE")qs.set("select",this._select);
    if(this._order)qs.set("order",this._order);
    if(this._limit)qs.set("limit",this._limit);
    this._filters.forEach(f=>{const idx=f.indexOf("=");qs.set(f.slice(0,idx),decodeURIComponent(f.slice(idx+1)));});
    for(const k in this._params)qs.set(k,this._params[k]);
    const opts={method:this._method,headers:Object.assign({},this._headers,(this._method==="POST"||this._method==="PATCH")?{Prefer:this._headers["Prefer"]||"return=representation"}:{})};
    if(this._body)opts.body=JSON.stringify(this._body);
    try{const data=await this.client._fetch("/rest/v1/"+this.table+"?"+qs.toString(),opts);return{data:this._single?(Array.isArray(data)?data[0]:data):data,error:null};}
    catch(e){return{data:null,error:{message:e.message}};}
  }
  then(resolve,reject){return this._build().then(resolve,reject);}
}

function Spin(){return html`<div class="lc"><div class="spin"/></div>`;}
function Alrt({type,children}){
  const t=type||"error";
  return html`<div class=${"alert "+(t==="error"?"ae":t==="success"?"as":"ai")}><${Ic} name=${t==="error"?"x":t==="success"?"check":"star"} size=${14}/>${children}</div>`;
}

function useAuth(){
  const [user,setUser]=useState(sb.user);
  const [profile,setProfile]=useState(null);
  const [loading,setLoading]=useState(true);
  const fetchProfile=useCallback(async function(u){
    if(!u){setProfile(null);setLoading(false);return;}
    const res=await sb.from("profiles").select("*").eq("id",u.id).maybeSingle();
    setProfile(res.data);setLoading(false);
  },[]);
  useEffect(function(){
    fetchProfile(sb.user);
    const sub=sb.onAuthStateChange(function(u){setUser(u);fetchProfile(u);});
    return sub.unsubscribe;
  },[fetchProfile]);
  return {user,profile,loading};
}

function useCrud(table,sel){
  sel=sel||"*";
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(false);
  const load=useCallback(async function(){
    setLoading(true);
    const res=await sb.from(table).select(sel).order("created_at",{ascending:false});
    setItems(res.data||[]);setLoading(false);
  },[table,sel]);
  async function create(b){const r=await sb.from(table).insert(b);if(r.error)throw new Error(r.error.message);await load();}
  async function update(id,b){const r=await sb.from(table).update(b).eq("id",id);if(r.error)throw new Error(r.error.message);await load();}
  async function remove(id){const r=await sb.from(table).delete().eq("id",id);if(r.error)throw new Error(r.error.message);await load();}
  return {items,loading,load,create,update,remove};
}

        ${footer&&html`<div class="mf">${footer}</div>`}

    </tbody></table></div>`}</div>
    ${modal&&html`<${Modal} title=${modal.mode==="add"?"Agregar "+title:"Editar "+title} onClose=${()=>setModal(null)} footer=${html`<div style=${{display:"flex",gap:"8px"}}><button class="btn bo" onClick=${()=>setModal(null)}>Cancelar</button><button class="btn bg" onClick=${save}>Guardar</button></div>`}>

function ImportTxt({onDone}){
  const [prev,setPrev]=useState("");const [parsed,setParsed]=useState([]);const [eq,setEq]=useState([]);const [nv,setNv]=useState([]);const [ct,setCt]=useState([]);const [an,setAn]=useState([]);const [ld,setLd]=useState(false);const [res,setRes]=useState(null);const ref=useRef();

  function onFile(file){const r=new FileReader();r.onload=e=>{const t=e.target.result;setPrev(t.slice(0,500));setParsed(t.trim().split("\n").filter(Boolean).map(l=>{const p=l.split(/[,;\t]+/).map(x=>x.trim());return{nombre:p[0]||"",apellido:p[1]||"",dni:p[2]||"",equipo:p[3]||"",nivel:p[4]||"",categoria:p[5]||"",anio:p[6]||""};}))} ;r.readAsText(file);}
  async function imp(){setLd(true);let ok=0,er=0;for(const row of parsed){const e=eq.find(x=>x.nombre.toLowerCase()===row.equipo.toLowerCase());const n=nv.find(x=>String(x.numero)===row.nivel);const c=ct.find(x=>x.nombre.toLowerCase()===row.categoria.toLowerCase());const a=an.find(x=>String(x.valor)===row.anio);try{await sb.from("participantes").upsert({nombre:row.nombre,apellido:row.apellido,dni:row.dni,equipo_id:e?e.id:null,nivel_id:n?n.id:null,categoria_id:c?c.id:null,anio_id:a?a.id:null},{onConflict:"dni"});ok++;}catch(err){er++;}}setRes({ok,er});setLd(false);}
  return html`<div>

  const [fil,setFil]=useState({equipo:"",nivel:"",categoria:"",anio:""});const [eq,setEq]=useState([]);const [nv,setNv]=useState([]);const [ct,setCt]=useState([]);const [an,setAn]=useState([]);

function MisFavoritas({userId}){

  function pod(fav){const g=data.filter(p=>p.categoria_id===fav.categoria_id&&p.nivel_id===fav.nivel_id&&p.anio_id===fav.anio_id).sort((a,b)=>((b.cal&&b.cal.total)||0)-((a.cal&&a.cal.total)||0));return{pos:g.findIndex(p=>p.id===fav.id)+1,total:g.length};}

        <div style=${{textAlign:"right"}}><div style=${{fontSize:"1.8rem",color:info.pos<=3?"var(--gold)":"var(--tp)"}}>${info.pos<=3?medals[info.pos-1]:"#"+info.pos}</div><div style=${{fontSize:".75rem",color:"var(--tl)"}}>de ${info.total} en su grupo</div></div>
      </div>

        ${discs.map(([d,k])=>html`<div key=${d} style=${{textAlign:"center",background:"var(--cream)",borderRadius:"8px",padding:"8px 16px"}}><div style=${{fontSize:".65rem",textTransform:"uppercase",letterSpacing:".08em",color:"var(--ts)"}}>${d}</div><div style=${{fontWeight:700,fontSize:"1.1rem",color:"var(--navy)"}}>${fav.cal[k]!=null?fav.cal[k].toFixed(3):"—"}</div></div>`)}
        <div style=${{textAlign:"center",background:"var(--gold)",borderRadius:"8px",padding:"8px 16px"}}><div style=${{fontSize:".65rem",textTransform:"uppercase",color:"var(--navy-light)"}}>Total</div><div style=${{fontWeight:700,fontSize:"1.1rem",color:"var(--navy)"}}>${fav.cal.total!=null?fav.cal.total.toFixed(3):"—"}</div></div>

    </div>`;})}</div>
  </div>`;

    <aside class=${"sb "+(sbOpen?"open":"")}>
      <div class="sb-logo"><h1>🤸‍♀️ GimnasiaTorneo</h1><p>Gymnastic Tournament Manager</p></div>
      <nav class="sb-nav">${vis.map(item=>{let secEl=null;if(item.sec&&item.sec!==lastSec){secEl=html`<div key=${"s-"+item.sec} class="sec-lbl">${item.sec}</div>`;lastSec=item.sec;}return html`<div key=${item.id}>${secEl}<div class=${"ni "+(page===item.id?"act":"")} onClick=${()=>{setPage(item.id);setSbOpen(false);}}><${Ic} name=${item.icon} size=${16}/>${item.label}</div></div>`;})}</nav>
      <div class="sb-foot"><div class="ubadge"><div class="uavatar">${ini}</div><div><div class="uemail">${user&&user.email}</div><div class="urole">${role}</div></div></div><button class="btn-out" onClick=${()=>sb.auth.signOut()}>Cerrar sesión</button></div>
    </aside>
    <main class="mc">
      <div class="topbar">
        <div style=${{display:"flex",alignItems:"center",gap:"12px"}}>
          <button class="ham" onClick=${()=>setSbOpen(v=>!v)}><span/><span/><span/></button>
          <span class="topbar-t">${(cur&&cur.label)||"Inicio"}</span>
        </div>
        <span class=${"badge "+(role==="admin"?"ba":role==="juez"?"bj":"bpub")}>${role}</span>
      </div>
      <div class="pc">${renderPage()}</div>
    </main>
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
