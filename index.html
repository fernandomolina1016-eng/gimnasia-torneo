class SupabaseClient {
  constructor(url, key) {
    this.url = url; this.key = key; this.token = null; this.refreshToken = null; this.user = null; this._authListeners = [];
    this._loadSession();
  }
  _loadSession() {
    try { const s = localStorage.getItem("sb_session"); if (s) { const p = JSON.parse(s); this.token = p.token; this.refreshToken = p.refreshToken; this.user = p.user; } } catch(e) {}
  }
  _saveSession(token, refreshToken, user) {
    this.token = token; this.refreshToken = refreshToken; this.user = user;
    if (token) localStorage.setItem("sb_session", JSON.stringify({ token, refreshToken, user }));
    else localStorage.removeItem("sb_session");
    this._authListeners.forEach(fn => fn(user));
  }
  onAuthStateChange(fn) { this._authListeners.push(fn); return { unsubscribe: () => { this._authListeners = this._authListeners.filter(f => f !== fn); } }; }
  async _fetch(path, options = {}) {
    const headers = { "Content-Type": "application/json", apikey: this.key, ...(this.token ? { Authorization: `Bearer ${this.token}` } : {}), ...options.headers };
    const res = await fetch(`${this.url}${path}`, { ...options, headers });
    const text = await res.text();
    let data; try { data = JSON.parse(text); } catch(e) { data = text; }
    if (!res.ok) throw new Error((data && data.message) || (data && data.error_description) || JSON.stringify(data));
    return data;
  }
  from(table) { return new QueryBuilder(this, table); }
}

function makeAuth(client) {
  return {
    signUp: (creds) => client._fetch("/auth/v1/signup", { method: "POST", body: JSON.stringify({ email: creds.email, password: creds.password }) }),
    signInWithPassword: async (creds) => {
      const data = await client._fetch("/auth/v1/token?grant_type=password", { method: "POST", body: JSON.stringify({ email: creds.email, password: creds.password }) });
      client._saveSession(data.access_token, data.refresh_token, data.user);
      return { data, error: null };
    },
    signOut: async () => { try { await client._fetch("/auth/v1/logout", { method: "POST" }); } catch(e) {} client._saveSession(null, null, null); },
    resetPasswordForEmail: (email) => client._fetch("/auth/v1/recover", { method: "POST", body: JSON.stringify({ email }) }),
    getUser: () => client.user,
  };
}

class QueryBuilder {
  constructor(client, table) { this.client=client; this.table=table; this._params={}; this._select="*"; this._order=null; this._body=null; this._method="GET"; this._filters=[]; this._single=false; this._limit=null; this._headers={}; }
  select(cols) { this._select = cols||"*"; return this; }
  order(col, opts) { const asc=(!opts||opts.ascending!==false); this._order=col+"."+(asc?"asc":"desc"); return this; }
  limit(n) { this._limit=n; return this; }
  single() { this._single=true; this._headers["Accept"]="application/vnd.pgrst.object+json"; return this; }
  maybeSingle() { this._single=true; return this; }
  eq(col, val) { this._filters.push(col+"=eq."+encodeURIComponent(val)); return this; }
  in(col, vals) { this._filters.push(col+"=in.("+vals.map(v=>encodeURIComponent(v)).join(",")+")" ); return this; }
  insert(data) { this._method="POST"; this._body=data; return this; }
  update(data) { this._method="PATCH"; this._body=data; return this; }
  upsert(data, opts={}) { this._method="POST"; this._body=data; this._headers["Prefer"]=opts.onConflict?"resolution=merge-duplicates,return=representation":"return=representation"; if(opts.onConflict) this._params.on_conflict=opts.onConflict; return this; }
  delete() { this._method="DELETE"; return this; }
  async _build() {
    const qs=new URLSearchParams();
    if(this._method==="GET"||this._method==="DELETE") qs.set("select",this._select);
    if(this._order) qs.set("order",this._order);
    if(this._limit) qs.set("limit",this._limit);
    this._filters.forEach(f=>{ const idx=f.indexOf("="); qs.set(f.slice(0,idx),decodeURIComponent(f.slice(idx+1))); });
    for(const k in this._params) qs.set(k,this._params[k]);
    const options={ method:this._method, headers:{ ...this._headers, ...((this._method==="POST"||this._method==="PATCH")?{Prefer:this._headers["Prefer"]||"return=representation"}:{}) } };
    if(this._body) options.body=JSON.stringify(this._body);
    try { const data=await this.client._fetch("/rest/v1/"+this.table+"?"+qs.toString(),options); return { data:this._single?(Array.isArray(data)?data[0]:data):data, error:null }; }
    catch(e) { return { data:null, error:{message:e.message} }; }
  }
  then(resolve, reject) { return this._build().then(resolve, reject); }
}

function useAuth() {
  const [user, setUser] = useState(supabase.user);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const fetchProfile = useCallback(async (u) => {
    if (!u) { setProfile(null); setLoading(false); return; }
    const res = await supabase.from("profiles").select("*").eq("id", u.id).maybeSingle();
    setProfile(res.data); setLoading(false);
  }, []);
  useEffect(() => {
    fetchProfile(supabase.user);
    const sub = supabase.onAuthStateChange((u) => { setUser(u); fetchProfile(u); });
    return sub.unsubscribe;
  }, [fetchProfile]);
  return { user, profile, loading };
}

function useCrud(table, sel="*") {
  const [items,setItems]=useState([]); const [loading,setLoading]=useState(false);
  const load=useCallback(async()=>{setLoading(true);const res=await supabase.from(table).select(sel).order("created_at",{ascending:false});setItems(res.data||[]);setLoading(false);},[table,sel]);
  const create=async b=>{const res=await supabase.from(table).insert(b);if(res.error)throw new Error(res.error.message);await load();};
  const update=async(id,b)=>{const res=await supabase.from(table).update(b).eq("id",id);if(res.error)throw new Error(res.error.message);await load();};
  const remove=async id=>{const res=await supabase.from(table).delete().eq("id",id);if(res.error)throw new Error(res.error.message);await load();};
  return{items,loading,load,create,update,remove};
}

function SimpleCRUD({title,table,fieldLabel,fieldKey}) {
  const{items,loading,load,create,update,remove}=useCrud(table);
  const[modal,setModal]=useState(null);const[val,setVal]=useState("");const[conf,setConf]=useState(null);const[err,setErr]=useState("");
  useEffect(()=>{load();},[load]);
  const save=async()=>{setErr("");if(!val.trim()){setErr("Campo requerido");return;}try{const isNum=fieldKey==="numero"||fieldKey==="valor";const v=isNum?parseInt(val):val;if(modal.mode==="add")await create({[fieldKey]:v});else await update(modal.item.id,{[fieldKey]:v});setModal(null);}catch(e){setErr(e.message);}};
  return(<div>
    <div className="ch"><h3 className="ct">{title}</h3><button className="btn bg" onClick={()=>{setVal("");setErr("");setModal({mode:"add"});}}><Ic name="plus" size={14}/>Agregar</button></div>
    <div className="cb">{loading?<Spin/>:(<div className="tw"><table><thead><tr><th>{fieldLabel}</th><th>Creado</th><th></th></tr></thead><tbody>
      {items.length===0&&<tr><td colSpan={3}><div className="es">Sin registros</div></td></tr>}
      {items.map(i=><tr key={i.id}><td><strong>{i[fieldKey]}</strong></td><td style={{color:"var(--tl)",fontSize:".8rem"}}>{new Date(i.created_at).toLocaleDateString("es-AR")}</td>
        <td><div style={{display:"flex",gap:"6px"}}><button className="btn bo bsm" onClick={()=>{setVal(String(i[fieldKey]));setErr("");setModal({mode:"edit",item:i});}}><Ic name="edit" size={12}/></button><button className="btn bd bsm" onClick={()=>setConf(i.id)}><Ic name="trash" size={12}/></button></div></td></tr>)}
    </tbody></table></div>)}</div>
    {modal&&<Modal title={modal.mode==="add"?`Agregar ${title}`:`Editar ${title}`} onClose={()=>setModal(null)} footer={<><button className="btn bo" onClick={()=>setModal(null)}>Cancelar</button><button className="btn bg" onClick={save}>Guardar</button></>}>

    </Modal>}
    {conf&&<Confirm msg="¿Eliminar este registro?" onOk={async()=>{await remove(conf);setConf(null);}} onNo={()=>setConf(null)}/>}
  </div>);

function ImportTxt({onDone}) {
  const[prev,setPrev]=useState("");const[parsed,setParsed]=useState([]);const[eq,setEq]=useState([]);const[nv,setNv]=useState([]);const[ct,setCt]=useState([]);const[an,setAn]=useState([]);const[ld,setLd]=useState(false);const[res,setRes]=useState(null);const ref=useRef();
  useEffect(()=>{Promise.all([supabase.from("equipos").select("*"),supabase.from("niveles").select("*"),supabase.from("categorias").select("*"),supabase.from("anios").select("*")]).then(([e,n,c,a])=>{setEq(e.data||[]);setNv(n.data||[]);setCt(c.data||[]);setAn(a.data||[]);});},[]);
  const onFile=file=>{const r=new FileReader();r.onload=e=>{const t=e.target.result;setPrev(t.slice(0,500));setParsed(t.trim().split("\n").filter(Boolean).map(l=>{const p=l.split(/[,;\t]+/).map(x=>x.trim());return{nombre:p[0]||"",apellido:p[1]||"",dni:p[2]||"",equipo:p[3]||"",nivel:p[4]||"",categoria:p[5]||"",anio:p[6]||""};}))} ;r.readAsText(file);};
  const imp=async()=>{setLd(true);let ok=0,er=0;for(const row of parsed){const e=eq.find(x=>x.nombre.toLowerCase()===row.equipo.toLowerCase());const n=nv.find(x=>String(x.numero)===row.nivel);const c=ct.find(x=>x.nombre.toLowerCase()===row.categoria.toLowerCase());const a=an.find(x=>String(x.valor)===row.anio);try{await supabase.from("participantes").upsert({nombre:row.nombre,apellido:row.apellido,dni:row.dni,equipo_id:e?.id||null,nivel_id:n?.id||null,categoria_id:c?.id||null,anio_id:a?.id||null},{onConflict:"dni"});ok++;}catch(err){er++;}}setRes({ok,er});setLd(false);};
  return(<div>
    <div className="ch"><h3 className="ct">Importar TXT</h3></div>
    <div className="cb">
      <div className="alert ai" style={{marginBottom:"16px"}}><Ic name="upload" size={14}/>Formato: <strong>Nombre, Apellido, DNI, Equipo, Nivel, Categoría, Año</strong></div>
      <input ref={ref} type="file" accept=".txt,.csv" style={{display:"none"}} onChange={e=>e.target.files[0]&&onFile(e.target.files[0])}/>
      <button className="btn bo" onClick={()=>ref.current.click()}><Ic name="upload" size={14}/>Seleccionar archivo</button>
      {prev&&<><div className="fg" style={{marginTop:"16px"}}><label className="fl">Previsualización</label><div className="tp2">{prev}</div></div>
        <div className="alert ai" style={{marginTop:"8px"}}><Ic name="list" size={14}/>{parsed.length} registros detectados</div>
        {res&&<div className={`alert ${res.er===0?"as":"ae"}`}><Ic name={res.er===0?"check":"x"} size={14}/>Importados: {res.ok} · Errores: {res.er}</div>}
        <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
          <button className="btn bg" onClick={imp} disabled={ld||!parsed.length}>{ld?`Importando...`:`Importar ${parsed.length} registros`}</button>
          {res&&<button className="btn bs" onClick={onDone}><Ic name="check" size={14}/>Ver participantes</button>}
        </div>
      </>}
    </div>
  </div>);
}

function ExportExcel() {
  const[ld,setLd]=useState(false);const[msg,setMsg]=useState("");
  const exp=async()=>{setLd(true);const[p,c]=await Promise.all([supabase.from("participantes").select("*, equipos(nombre), niveles(numero), categorias(nombre), anios(valor)").order("apellido"),supabase.from("calificaciones").select("*")]);const cm={};(c.data||[]).forEach(x=>{cm[x.participante_id]=x;});const g={};(p.data||[]).forEach(x=>{const k=`${x.categorias?.nombre||"?"} - Nivel ${x.niveles?.numero||"?"} - ${x.anios?.valor||"?"}`;if(!g[k])g[k]=[];g[k].push(x);});Object.keys(g).forEach(k=>{g[k].sort((a,b)=>(cm[b.id]?.total||0)-(cm[a.id]?.total||0));});let csv="NOMBRE,APELLIDO,DNI,EQUIPO,NIVEL,CATEGORÍA,AÑO,SUELO,SALTO,VIGA,PARALELAS,TOTAL,POSICIÓN\n";Object.entries(g).forEach(([k,ps])=>{csv+=`\n### ${k} ###\n`;ps.forEach((x,i)=>{const cal=cm[x.id];csv+=`${x.nombre},${x.apellido},${x.dni},${x.equipos?.nombre||""},${x.niveles?.numero||""},${x.categorias?.nombre||""},${x.anios?.valor||""},${cal?.suelo||0},${cal?.salto||0},${cal?.viga||0},${cal?.paralelas||0},${cal?.total||0},${i+1}\n`;});});const b=new Blob([csv],{type:"text/csv;charset=utf-8;"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`torneo_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(u);setMsg("¡Exportado!");setLd(false);};
  return(<div><div className="ch"><h3 className="ct">Exportar CSV</h3></div><div className="cb"><p style={{color:"var(--ts)",marginBottom:"20px"}}>Descargá el listado completo con puntajes, ranking y posiciones por grupo.</p>{msg&&<Alrt type="success">{msg}</Alrt>}<button className="btn bg" onClick={exp} disabled={ld}><Ic name="download" size={14}/>{ld?"Exportando...":"Descargar CSV"}</button></div></div>);
}

    </Modal>}

function BannerCarousel() {
  const[banners,setBanners]=useState([]);const[cur,setCur]=useState(0);
  useEffect(()=>{supabase.from("banners").select("*").eq("activo",true).order("orden").then(res=>setBanners(res.data||[]));},[]);
  useEffect(()=>{if(banners.length<=1)return;const t=setInterval(()=>setCur(c=>(c+1)%banners.length),4000);return()=>clearInterval(t);},[banners.length]);

function PublicParticipantes({userId}) {
  const[parts,setParts]=useState([]);const[cals,setCals]=useState({});const[favs,setFavs]=useState(new Set());const[ld,setLd]=useState(true);
  const[fil,setFil]=useState({equipo:"",nivel:"",categoria:"",anio:""});const[eq,setEq]=useState([]);const[nv,setNv]=useState([]);const[ct,setCt]=useState([]);const[an,setAn]=useState([]);
  useEffect(()=>{(async()=>{const favProm=userId?supabase.from("favoritas").select("participante_id").eq("user_id",userId):Promise.resolve({data:[]});const[p,c,fv,e,n,cat,a]=await Promise.all([supabase.from("participantes").select("*, equipos(nombre), niveles(numero), categorias(nombre), anios(valor)").order("apellido"),supabase.from("calificaciones").select("*"),favProm,supabase.from("equipos").select("*").order("nombre"),supabase.from("niveles").select("*").order("numero"),supabase.from("categorias").select("*").order("nombre"),supabase.from("anios").select("*").order("valor")]);setParts(p.data||[]);const cm={};(c.data||[]).forEach(x=>{cm[x.participante_id]=x;});setCals(cm);setFavs(new Set((fv.data||[]).map(x=>x.participante_id)));setEq(e.data||[]);setNv(n.data||[]);setCt(cat.data||[]);setAn(a.data||[]);setLd(false);})();},[userId]);
  const tog=async pid=>{if(!userId)return;if(favs.has(pid)){await supabase.from("favoritas").delete().eq("user_id",userId).eq("participante_id",pid);setFavs(s=>{const n=new Set(s);n.delete(pid);return n;});}else{await supabase.from("favoritas").insert({user_id:userId,participante_id:pid});setFavs(s=>new Set([...s,pid]));}};
  const filt=parts.filter(p=>{if(fil.equipo&&p.equipo_id!==fil.equipo)return false;if(fil.nivel&&p.nivel_id!==fil.nivel)return false;if(fil.categoria&&p.categoria_id!==fil.categoria)return false;if(fil.anio&&p.anio_id!==fil.anio)return false;return true;});
  const filterSets=[["equipo",eq,"nombre","Equipo"],["nivel",nv,"numero","Nivel"],["categoria",ct,"nombre","Categoría"],["anio",an,"valor","Año"]];
  return(<div>
    <div className="ch"><h3 className="ct">Participantes</h3><span style={{fontSize:".85rem",color:"var(--ts)"}}>{filt.length} gimnastas</span></div>
    <div className="cb">
      <div className="fr">{filterSets.map(([k,o,vk,lb])=><select key={k} className="fs" value={fil[k]} onChange={e=>{const v=e.target.value;setFil(prev=>({...prev,[k]:v}));}}><option value="">Todos {lb}s</option>{o.map(x=><option key={x.id} value={x.id}>{vk==="numero"?`Nivel ${x[vk]}`:x[vk]}</option>)}</select>)}</div>
      {ld?<Spin/>:<div className="tw"><table><thead><tr><th></th><th>Participante</th><th>Equipo</th><th>Nivel</th><th>Cat.</th><th>Año</th><th>Total</th></tr></thead><tbody>
        {filt.length===0&&<tr><td colSpan={7}><div className="es">Sin participantes</div></td></tr>}
        {filt.map(p=>{const isFav=favs.has(p.id);return(<tr key={p.id}><td><button className={`fb ${isFav?"act":""}`} onClick={()=>tog(p.id)}><Ic name={isFav?"heart-filled":"heart"} size={16}/></button></td><td><strong>{p.apellido}, {p.nombre}</strong></td><td>{p.equipos?.nombre||"—"}</td><td>N{p.niveles?.numero||"—"}</td><td>{p.categorias?.nombre||"—"}</td><td>{p.anios?.valor||"—"}</td><td><strong style={{color:"var(--gold-dark)"}}>{cals[p.id]?.total?.toFixed(3)||"—"}</strong></td></tr>);})}
      </tbody></table></div>}
    </div>
  </div>);
}

function MisFavoritas({userId}) {
  const[data,setData]=useState([]);const[ld,setLd]=useState(true);
  useEffect(()=>{if(!userId){setLd(false);return;}(async()=>{const fvRes=await supabase.from("favoritas").select("participante_id").eq("user_id",userId);if(!fvRes.data?.length){setLd(false);return;}const ids=fvRes.data.map(x=>x.participante_id);const[{data:pts},{data:cs}]=await Promise.all([supabase.from("participantes").select("*, equipos(nombre), niveles(numero), categorias(nombre), anios(valor)").in("id",ids),supabase.from("calificaciones").select("*")]);const cm={};(cs||[]).forEach(x=>{cm[x.participante_id]=x;});setData((pts||[]).map(p=>({...p,cal:cm[p.id]||null})));setLd(false);})();},[userId]);
  const pod=fav=>{const g=data.filter(p=>p.categoria_id===fav.categoria_id&&p.nivel_id===fav.nivel_id&&p.anio_id===fav.anio_id).sort((a,b)=>(b.cal?.total||0)-(a.cal?.total||0));return{pos:g.findIndex(p=>p.id===fav.id)+1,total:g.length};};
  const medals=["🥇","🥈","🥉"];
  const discs=[["Suelo","suelo"],["Salto","salto"],["Viga","viga"],["Paralelas","paralelas"]];
  if(!userId)return<div className="cb"><Alrt type="info">Iniciá sesión para guardar tus favoritas.</Alrt></div>;
  return(<div>
    <div className="ch"><h3 className="ct">Mis Favoritas</h3></div>
    <div className="cb">{ld?<Spin/>:data.length===0?<div className="es"><Ic name="heart" size={32}/><p>Todavía no marcaste ninguna favorita.</p></div>:data.map(fav=>{const{pos,total}=pod(fav);return(<div key={fav.id} className="card" style={{marginBottom:"16px"}}>
      <div style={{padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}}>
        <div><div style={{fontWeight:700,fontSize:"1rem",color:"var(--navy)"}}>{fav.apellido}, {fav.nombre}</div><div style={{fontSize:".8rem",color:"var(--ts)",marginTop:"4px"}}>{fav.equipos?.nombre} · N{fav.niveles?.numero} · {fav.categorias?.nombre} · {fav.anios?.valor}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:"1.8rem",fontFamily:"Playfair Display,serif",color:pos<=3?"var(--gold)":"var(--tp)"}}>{pos<=3?medals[pos-1]:`#${pos}`}</div><div style={{fontSize:".75rem",color:"var(--tl)"}}>de {total} en su grupo</div></div>
      </div>
      {fav.cal&&<div style={{padding:"0 20px 16px",display:"flex",gap:"12px",flexWrap:"wrap"}}>{discs.map(([d,k])=><div key={d} style={{textAlign:"center",background:"var(--cream)",borderRadius:"8px",padding:"8px 16px"}}><div style={{fontSize:".65rem",textTransform:"uppercase",letterSpacing:".08em",color:"var(--ts)"}}>{d}</div><div style={{fontWeight:700,fontSize:"1.1rem",color:"var(--navy)"}}>{fav.cal[k]?.toFixed(3)||"—"}</div></div>)}<div style={{textAlign:"center",background:"var(--gold)",borderRadius:"8px",padding:"8px 16px"}}><div style={{fontSize:".65rem",textTransform:"uppercase",color:"var(--navy-light)"}}>Total</div><div style={{fontWeight:700,fontSize:"1.1rem",color:"var(--navy)"}}>{fav.cal.total?.toFixed(3)}</div></div></div>}
    </div>);})}
  </div>);
}

    case"export":return<div className="card"><ExportExcel/></div>;
    case"banners":return<div className="card"><BannersAdmin/></div>;
    case"usuarios":return<div className="card"><UsuariosAdmin/></div>;
    default:return<div className="es"><p>Página no encontrada</p></div>;
  }};
  const cur=nav.find(n=>n.id===page);
  const ini=((user&&user.email)||"U")[0].toUpperCase();
  let lastSec=null;
  return(<>
    <div className="shell">
      <div className={`sov ${sbOpen?"vis":""}`} onClick={()=>setSbOpen(false)}/>
      <aside className={`sb ${sbOpen?"open":""}`}>
        <div className="sb-logo"><h1>🤸‍♀️ GimnasiaTorneo</h1><p>Gymnastic Tournament Manager</p></div>
        <nav className="sb-nav">{vis.map(item=>{let secEl=null;if(item.sec&&item.sec!==lastSec){secEl=<div key={`s-${item.sec}`} className="sec-lbl">{item.sec}</div>;lastSec=item.sec;}return(<div key={item.id}>{secEl}<div className={`ni ${page===item.id?"act":""}`} onClick={()=>{setPage(item.id);setSbOpen(false);}}><Ic name={item.icon} size={16}/>{item.label}</div></div>);})}</nav>
        <div className="sb-foot"><div className="ubadge"><div className="uavatar">{ini}</div><div><div className="uemail">{user&&user.email}</div><div className="urole">{role}</div></div></div><button className="btn-out" onClick={()=>supabase.auth.signOut()}>Cerrar sesión</button></div>
      </aside>
      <main className="mc">
        <div className="topbar">
          <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
            <button className="ham" onClick={()=>setSbOpen(v=>!v)}><span/><span/><span/></button>
            <span className="topbar-t">{(cur&&cur.label)||"Inicio"}</span>
          </div>
          <span className={`badge ${role==="admin"?"ba":role==="juez"?"bj":"bpub"}`}>{role}</span>
        </div>
        <div className="pc">{renderPage()}</div>
      </main>
    </div>
  </>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
